<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>adataviz</title>
  </head>
  <body>
  <div class="app-container">

    <header class="main-header">
      <h1>Parcs et Jardins de Nantes</h1>
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Rechercher un lieu...">
      </div>
    </header>

    <main>
      <section id="map-section">
        <h2>Carte de la ville</h2>
        <iframe 
            src="https://data.nantesmetropole.fr/explore/embed/dataset/244400404_parcs-jardins-nantes/map/?disjunctive.gardien&disjunctive.jeux_enfants&disjunctive.pataugeoire&disjunctive.sanitaires&disjunctive.sanitaires_handicapes&disjunctive.chiens_autorises&disjunctive.jardin_clos&disjunctive.abris&disjunctive.point_eau_potable&disjunctive.table_pique_nique&disjunctive.libtype&location=13,47.2183,-1.5536&basemap=jawg.streets&static=false&datasetcard=false&scrollWheelZoom=false" 
            width="100%" 
            height="450" 
            frameborder="0" 
            style="border-radius: 20px; display: block;">
        </iframe>
      </section>

      <section id="data-section">
        <h2>Données par catégories</h2>
        
        <div class="categories-columns">
          
          <div class="column-category">
            <h3>🌳 Parcs</h3>
            <div id="container-parcs" class="cards-grid"></div>
          </div>

          <div class="column-category">
            <h3>🛝 Squares</h3>
            <div id="container-squares" class="cards-grid"></div>
          </div>

          <div class="column-category">
            <h3>🌷 Jardins</h3>
            <div id="container-jardins" class="cards-grid"></div>
          </div>

        </div>
      </section>
    </main>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
